name: Build RK3568 KVM DTB Fast

on:
  workflow_dispatch:
    inputs:
      kernel_branch:
        description: Linux stable branch matching the installed Armbian kernel
        required: true
        default: linux-6.18.y
        type: string

jobs:
  build-dtb-fast:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Install DTB build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc \
            bison \
            ca-certificates \
            device-tree-compiler \
            flex \
            gcc-aarch64-linux-gnu \
            git \
            libelf-dev \
            libssl-dev \
            make \
            python3

      - name: Checkout Linux stable kernel
        shell: bash
        run: |
          git clone \
            --depth 1 \
            --branch "${{ inputs.kernel_branch }}" \
            --filter=blob:none \
            https://git.kernel.org/pub/scm/linux/kernel/git/stable/linux.git \
            linux

      - name: Add custom DTS
        shell: bash
        run: |
          set -euo pipefail

          cp patches/rk3568-ydtx-kvm-mainline.dts \
            linux/arch/arm64/boot/dts/rockchip/rk3568-ydtx-kvm.dts

          grep -q 'rk3568-ydtx-kvm.dtb' linux/arch/arm64/boot/dts/rockchip/Makefile || \
            printf '%s\n' 'dtb-$(CONFIG_ARCH_ROCKCHIP) += rk3568-ydtx-kvm.dtb' \
              >> linux/arch/arm64/boot/dts/rockchip/Makefile

      - name: Build custom DTB only
        shell: bash
        working-directory: linux
        run: |
          set -euo pipefail

          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- defconfig
          make ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            rockchip/rk3568-ydtx-kvm.dtb

      - name: Collect custom DTB
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dtb-output
          cp linux/arch/arm64/boot/dts/rockchip/rk3568-ydtx-kvm.dtb \
            dtb-output/rk3568-ydtx-kvm.dtb
          sha256sum dtb-output/rk3568-ydtx-kvm.dtb | tee dtb-output/rk3568-ydtx-kvm.dtb.sha256
          ls -lh dtb-output

      - name: Upload DTB artifact
        uses: actions/upload-artifact@v4
        with:
          name: rk3568-ydtx-kvm-dtb-fast-${{ inputs.kernel_branch }}
          path: dtb-output/*
          if-no-files-found: error
          retention-days: 14
