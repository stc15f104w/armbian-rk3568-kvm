name: Build Armbian RK3568 KVM

on:
  workflow_dispatch:
    inputs:
      release:
        description: Debian/Ubuntu release
        required: true
        default: bookworm
        type: choice
        options:
          - bookworm
          - trixie
          - noble
      branch:
        description: Armbian kernel branch
        required: true
        default: current
        type: choice
        options:
          - current
          - edge
      minimal:
        description: Build minimal server image
        required: true
        default: true
        type: boolean

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout this repository
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - name: Set up QEMU binfmt
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,arm

      - name: Checkout Armbian build
        uses: actions/checkout@v4
        with:
          repository: armbian/build
          path: build
          fetch-depth: 1

      - name: Restore Armbian build cache
        uses: actions/cache@v4
        with:
          path: |
            .ccache
            build/cache
            build/output/debs
          key: armbian-${{ runner.os }}-${{ inputs.release }}-${{ inputs.branch }}-${{ inputs.minimal }}-${{ hashFiles('config/**', 'patches/**', 'scripts/**', '.github/workflows/build-armbian-rk3568-kvm.yml') }}
          restore-keys: |
            armbian-${{ runner.os }}-${{ inputs.release }}-${{ inputs.branch }}-${{ inputs.minimal }}-
            armbian-${{ runner.os }}-${{ inputs.release }}-${{ inputs.branch }}-
            armbian-${{ runner.os }}-

      - name: Prepare custom board and DTS patches
        shell: bash
        run: bash ./scripts/prepare-userpatches.sh "$GITHUB_WORKSPACE/build"

      - name: Disable inherited APT proxy
        shell: bash
        run: |
          sudo rm -f /etc/apt/apt.conf.d/*proxy* /etc/apt/apt.conf.d/*Proxy*
          unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY apt_proxy APT_PROXY
          echo "APT_PROXY=" >> "$GITHUB_ENV"
          echo "HTTP_PROXY=" >> "$GITHUB_ENV"
          echo "HTTPS_PROXY=" >> "$GITHUB_ENV"
          echo "NO_APT_CACHER=yes" >> "$GITHUB_ENV"

      - name: Build image
        shell: bash
        working-directory: build
        env:
          APT_PROXY: ""
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          NO_APT_CACHER: "yes"
          USE_CCACHE: "yes"
          CCACHE_DIR: ${{ github.workspace }}/.ccache
          CCACHE_MAXSIZE: "2G"
        run: |
          ./compile.sh \
            build \
            BOARD=rk3568-ydtx-kvm \
            BRANCH=${{ inputs.branch }} \
            RELEASE=${{ inputs.release }} \
            BUILD_MINIMAL=${{ inputs.minimal && 'yes' || 'no' }} \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            EXPERT=yes \
            USE_CCACHE=yes \
            CCACHE_DIR="${GITHUB_WORKSPACE}/.ccache" \
            CCACHE_MAXSIZE=2G \
            CLEAN_LEVEL="" \
            NO_APT_CACHER=yes \
            COMPRESS_OUTPUTIMAGE=sha,img

      - name: Verify custom DTB was built
        shell: bash
        run: |
          find build -name rk3568-ydtx-kvm.dtb -print -quit | grep -q .

      - name: Verify image artifact was built
        shell: bash
        run: |
          find build/output/images -maxdepth 1 -name '*.img' -print -quit | grep -q .

      - name: Prepare cache for save
        shell: bash
        run: |
          sudo find build/cache/aptcache -type f -name lock -delete 2>/dev/null || true
          sudo find build/cache/aptcache -type d -name partial -prune -exec rm -rf {} + 2>/dev/null || true
          sudo find build/cache/sources -type f -name initramfs_data.cpio -delete 2>/dev/null || true
          sudo chown -R "$USER:$USER" .ccache build/cache build/output/debs 2>/dev/null || true
          chmod -R u+rwX .ccache build/cache build/output/debs 2>/dev/null || true

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: armbian-rk3568-kvm-${{ inputs.release }}-${{ inputs.branch }}
          path: |
            build/output/images/*.img
            build/output/images/*.img.sha
            build/output/images/*.txt
            build/output/debs/*.deb
          if-no-files-found: error
          retention-days: 14

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: armbian-build-logs-${{ inputs.release }}-${{ inputs.branch }}
          path: build/output/logs/*
          if-no-files-found: ignore
          retention-days: 14
